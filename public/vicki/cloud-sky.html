<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#0a0a0a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Cloud Sky · Hometown at Dusk · Slant'd</title>
<meta name="description" content="From Vicki Wang's photo essay in Slant'd Magazine Issue 06: Homecoming.">
<meta property="og:title" content="Hometown at Dusk — Cloud Sky">
<meta property="og:description" content="Vicki Wang for Slant'd Magazine Issue 06: Homecoming">
<meta property="og:type" content="video.other">
<link rel="stylesheet" href="shared.css">
</head>
<body>
<main class="stage" id="stage">
  <video class="media" id="video"
         autoplay muted loop playsinline preload="auto"
         src="media/clouds.mp4"></video>

  <button class="unmute" id="unmute" aria-label="Tap to unmute">
    <svg viewBox="0 0 24 24" aria-hidden="true">
      <path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.17v2.06a8.99 8.99 0 003.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>
    </svg>
    <span>Tap to unmute</span>
  </button>

  <header class="brand">
    <span class="mark">Slant&rsquo;d</span>
    <span class="issue">Issue 06 · Homecoming</span>
  </header>

  <footer class="caption">
    <h1 class="scene-title">Cloud Sky</h1>
    <p class="essay">from <em>Hometown at Dusk</em></p>
    <p class="byline">Photographs by Vicki Wang</p>
    <a href="/vicki" class="back">&larr; all scenes</a>
  </footer>

  <a href="/" class="fukkatsu-mark" aria-label="Powered by Fukkatsu"><span class="kanji">復活</span>FUKKATSU</a>
</main>

<script>
(function(){
  const video = document.getElementById("video");
  const btn = document.getElementById("unmute");
  const stage = document.getElementById("stage");

  const tryPlay = () => video.play().catch(()=>{});
  tryPlay();
  document.addEventListener("visibilitychange", () => { if (!document.hidden) tryPlay(); });

  let unmuted = false;
  const toggle = () => {
    if (!unmuted) {
      video.muted = false;
      tryPlay();
      btn.querySelector("span").textContent = "Sound on";
      unmuted = true;
      setTimeout(() => btn.classList.add("fade"), 1400);
    } else {
      video.muted = true;
      btn.classList.remove("fade");
      btn.querySelector("span").textContent = "Tap to unmute";
      unmuted = false;
    }
  };

  btn.addEventListener("click", (e) => { e.stopPropagation(); toggle(); });
  stage.addEventListener("click", toggle);
})();
</script>
</body>
</html>
