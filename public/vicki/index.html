<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0a">
<title>Hometown at Dusk · Vicki Wang · Slant'd Issue 06</title>
<meta name="description" content="A photo essay by Vicki Wang. Hometown at Dusk, originally published in Slant'd Magazine Issue 06: Homecoming.">
<meta property="og:title" content="Hometown at Dusk — Vicki Wang">
<meta property="og:description" content="Photo essay from Slant'd Magazine Issue 06: Homecoming">
<meta property="og:image" content="media/orange-train.png">
<link rel="stylesheet" href="shared.css">
<style>
  body { overflow-y: auto; height: auto; min-height: 100dvh; }
  .index-wrap {
    min-height: 100dvh;
    padding: calc(env(safe-area-inset-top, 0px) + 4rem) 1.5rem calc(env(safe-area-inset-bottom, 0px) + 3rem);
    max-width: 560px;
    margin: 0 auto;
  }
  .index-header { margin-bottom: 2.5rem; }
  .index-header .mark { font-size: 1.5rem; display: inline-block; margin-bottom: 1.5rem; }
  .index-header .issue { display: block; margin-bottom: 0.75rem; }
  .index-header h1 {
    font-family: "Times New Roman", Georgia, serif;
    font-weight: 400;
    font-size: 2.5rem;
    line-height: 1.05;
    letter-spacing: -0.025em;
    margin-bottom: 0.5rem;
  }
  .index-header h1 em { font-style: italic; }
  .index-header .by {
    font-size: 0.75rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-dim);
  }
  .index-header .blurb {
    margin-top: 1.25rem;
    font-size: 0.95rem;
    line-height: 1.55;
    color: var(--ink-dim);
  }

  .scene-grid { display: grid; gap: 1rem; }
  .scene-card {
    display: block;
    position: relative;
    aspect-ratio: 16 / 10;
    overflow: hidden;
    border-radius: 14px;
    text-decoration: none;
    color: var(--ink);
    background: #111;
    border: 1px solid rgba(255,255,255,0.06);
    transition: transform 0.25s ease, border-color 0.25s ease;
  }
  .scene-card:hover { transform: translateY(-2px); border-color: rgba(255,255,255,0.16); }
  .scene-card video,
  .scene-card img {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }
  .scene-card .meta {
    position: absolute;
    inset: auto 0 0 0;
    padding: 1.25rem 1rem 1rem;
    background: linear-gradient(to top, rgba(0,0,0,0.85), transparent);
    display: flex;
    justify-content: space-between;
    align-items: end;
    gap: 0.5rem;
  }
  .scene-card .name {
    font-family: "Times New Roman", Georgia, serif;
    font-size: 1.25rem;
    letter-spacing: -0.01em;
  }
  .scene-card .tag {
    font-size: 0.6rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    padding: 0.25rem 0.5rem;
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,0.18);
    color: var(--ink-dim);
    white-space: nowrap;
  }
  .scene-card .tag.video { color: var(--accent); border-color: var(--accent); }

  .footer-mark {
    margin-top: 3rem;
    text-align: center;
    font-size: 0.7rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-faint);
  }
  .footer-mark .kanji { color: var(--accent); margin-right: 0.4rem; font-size: 0.85rem; }
  .footer-mark a { color: inherit; text-decoration: none; border-bottom: 1px solid rgba(255,255,255,0.15); padding-bottom: 1px; }
</style>
</head>
<body>
<div class="index-wrap">
  <header class="index-header">
    <span class="mark">Slant&rsquo;d</span>
    <span class="issue">Issue 06 · Homecoming</span>
    <h1><em>Hometown at Dusk</em></h1>
    <p class="by">Photographs by Vicki Wang</p>
    <p class="blurb">A photo essay on the texture of returning. Five scenes. Tap any one to enter.</p>
  </header>

  <nav class="scene-grid">
    <a class="scene-card" href="/vicki/train-passby">
      <video autoplay muted loop playsinline preload="metadata" src="media/vertical-train.mp4"></video>
      <div class="meta"><span class="name">Train Passby</span><span class="tag video">Video</span></div>
    </a>
    <a class="scene-card" href="/vicki/cloud-sky">
      <video autoplay muted loop playsinline preload="metadata" src="media/clouds.mp4"></video>
      <div class="meta"><span class="name">Cloud Sky</span><span class="tag video">Video</span></div>
    </a>
    <a class="scene-card" href="/vicki/orange-train">
      <img src="media/orange-train.png" alt="">
      <div class="meta"><span class="name">Orange Train</span><span class="tag">Image</span></div>
    </a>
    <a class="scene-card" href="/vicki/signs">
      <img src="media/signs.png" alt="">
      <div class="meta"><span class="name">Signs</span><span class="tag">Image</span></div>
    </a>
    <a class="scene-card" href="/vicki/grandma">
      <img src="media/grandma.png" alt="">
      <div class="meta"><span class="name">Grandma</span><span class="tag">Image</span></div>
    </a>
  </nav>

  <p class="footer-mark"><a href="/"><span class="kanji">復活</span>FUKKATSU</a></p>
</div>
</body>
</html>
